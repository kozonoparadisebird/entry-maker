<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>心の備蓄の入口メーカー</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: "M PLUS Rounded 1c", sans-serif;
  text-align: center;
  background: #fff;
  margin: 0;
  padding: 0;
}

h1 {
  margin-top: 30px;
  font-size: 24px;
  color: #333;
}

.sub {
  margin-top: 6px;
  font-size: 15px;
  color: #666;
}

#container {
  position: relative;
  width: 90%;
  max-width: 800px;
  margin: 20px auto;
}

#baseImage {
  width: 100%;
  display: block;
}

.tapArea {
  position: absolute;
  background: rgba(0,0,0,0);
}

#saveBtn {
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 0 8px rgba(0,0,0,0.2);
  font-size: 28px;
  border: none;
}

#modalBg {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.4);
  display:none;
}

#modal {
  position:absolute;
  top:50%; left:50%;
  transform: translate(-50%, -50%);
  background:white;
  padding:20px;
  border-radius:12px;
  width:80%;
  max-width:300px;
}

#modal input {
  width:100%;
  padding:8px;
  font-size:16px;
  margin-bottom:10px;
}

#modal button {
  padding:8px 16px;
  font-size:16px;
}
</style>
</head>

<body>

<h1>心の備蓄の入口メーカー</h1>
<div class="sub">使うほどに、世界がきらめく。</div>

<div id="container">
  <img id="baseImage" src="10shiten.png">
</div>

<button id="saveBtn">⬇</button>

<div id="modalBg">
  <div id="modal">
    <input id="editText" type="text">
    <button id="saveText">保存</button>
  </div>
</div>

<script>
// 20吹き出しの割合座標
const areas = [
  {id:"1L", x:0.22, y:0.085, w:0.22, h:0.07},
  {id:"1R", x:0.78, y:0.085, w:0.22, h:0.07},
  {id:"2L", x:0.22, y:0.165, w:0.22, h:0.07},
  {id:"2R", x:0.78, y:0.165, w:0.22, h:0.07},
  {id:"3L", x:0.22, y:0.245, w:0.22, h:0.07},
  {id:"3R", x:0.78, y:0.245, w:0.22, h:0.07},
  {id:"4L", x:0.22, y:0.325, w:0.22, h:0.07},
  {id:"4R", x:0.78, y:0.325, w:0.22, h:0.07},
  {id:"5L", x:0.22, y:0.405, w:0.22, h:0.07},
  {id:"5R", x:0.78, y:0.405, w:0.22, h:0.07},
  {id:"6L", x:0.22, y:0.485, w:0.22, h:0.07},
  {id:"6R", x:0.78, y:0.485, w:0.22, h:0.07},
  {id:"7L", x:0.22, y:0.565, w:0.22, h:0.07},
  {id:"7R", x:0.78, y:0.565, w:0.22, h:0.07},
  {id:"8L", x:0.22, y:0.645, w:0.22, h:0.07},
  {id:"8R", x:0.78, y:0.645, w:0.22, h:0.07},
  {id:"9L", x:0.22, y:0.725, w:0.22, h:0.07},
  {id:"9R", x:0.78, y:0.725, w:0.22, h:0.07},
  {id:"10L", x:0.22, y:0.805, w:0.22, h:0.07},
  {id:"10R", x:0.78, y:0.805, w:0.22, h:0.07},
];

let texts = {};
let currentId = null;

const container = document.getElementById("container");
const baseImage = document.getElementById("baseImage");

// タップ領域配置
baseImage.onload = () => {
  const displayW = baseImage.clientWidth;
  const displayH = baseImage.clientHeight;

  areas.forEach(a => {
    const div = document.createElement("div");
    div.className = "tapArea";

    div.style.left = (a.x * displayW) + "px";
    div.style.top = (a.y * displayH) + "px";
    div.style.width = (a.w * displayW) + "px";
    div.style.height = (a.h * displayH) + "px";

    div.dataset.id = a.id;

    div.onclick = () => {
      currentId = a.id;
      document.getElementById("editText").value = texts[a.id] || "";
      document.getElementById("modalBg").style.display = "block";
    };

    container.appendChild(div);
  });
};

// モーダル保存
document.getElementById("saveText").onclick = () => {
  const val = document.getElementById("editText").value;
  texts[currentId] = val;
  document.getElementById("modalBg").style.display = "none";
};

// PNG 保存
document.getElementById("saveBtn").onclick = () => {
  const img = new Image();
  img.src = "10shiten.png";

  img.onload = () => {
    const canvas = document.createElement("canvas");
    canvas.width = img.width;
    canvas.height = img.height;
    const ctx = canvas.getContext("2d");

    ctx.drawImage(img, 0, 0);

    ctx.font = "32px 'M PLUS Rounded 1c'";
    ctx.fillStyle = "#333";
    ctx.textAlign = "center";

    areas.forEach(a => {
      const text = texts[a.id];
      if (text) {
        const x = img.width * a.x + (img.width * a.w) / 2;
        const y = img.height * a.y + (img.height * a.h) / 2 + 10;
        ctx.fillText(text, x, y);
      }
    });

    const link = document.createElement("a");
    link.download = "entry.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  };
};
</script>

</body>
</html>
