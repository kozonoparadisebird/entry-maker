<script>
const IMG_W = 1414;
const IMG_H = 2000;

const areas = [ /* 省略（あなたのままでOK） */ ];

let texts = {};
let previewDivs = {};
let maxCharsMap = {};
let currentId = null;

const baseImage = document.getElementById("baseImage");
const container = document.getElementById("container");

let initialized = false; // ★ 追加：二重実行防止

function init() {
  if (initialized) return;  // ★ 2回目以降は無視
  initialized = true;

  const displayW = baseImage.clientWidth;
  const displayH = baseImage.clientHeight;

  const scaleX = (displayW / IMG_W) * 1.06;
  const scaleY = (displayH / IMG_H) * 1.06;

  areas.forEach(a => {
    const left = a.x * scaleX;
    const top  = a.y * scaleY;
    const w    = a.w * scaleX;
    const h    = a.h * scaleY;

    const fontSize = 22;
    const lineHeight = fontSize * 1.35;

    const usableW = w - 24;
    const usableH = h - 24;

    const maxLines = Math.floor(usableH / lineHeight);
    const maxCharsPerLine = Math.floor(usableW / (fontSize * 0.9));

    maxCharsMap[a.id] = Math.max(1, maxLines * maxCharsPerLine);

    const div = document.createElement("div");
    div.className = "tapArea";
    div.style.left = left + "px";
    div.style.top = top + "px";
    div.style.width = w + "px";
    div.style.height = h + "px";
    div.dataset.id = a.id;

    div.onclick = () => {
      currentId = a.id;
      document.getElementById("editText").value = texts[a.id] || "";
      document.getElementById("maxInfo").innerText = `（最大 ${maxCharsMap[a.id]} 文字）`;
      document.getElementById("modalBg").style.display = "block";
    };

    container.appendChild(div);

    const p = document.createElement("div");
    p.className = "previewText";
    p.style.left = (left + 12) + "px";
    p.style.top = (top + 12) + "px";
    p.style.width = (w - 24) + "px";
    p.style.height = (h - 24) + "px";

    container.appendChild(p);
    previewDivs[a.id] = p;
  });
}

// ★ load が発火したら init
baseImage.addEventListener("load", init);

// ★ 読み込み済みなら即 init
if (baseImage.complete) {
  init();
}
</script>
