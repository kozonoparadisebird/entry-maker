<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>心の備蓄の入口メーカー</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: "M PLUS Rounded 1c", sans-serif;
  text-align: center;
  background: #fff;
  margin: 0;
  padding: 0;
}

h1 {
  margin-top: 30px;
  font-size: 24px;
  color: #333;
}

.sub {
  margin-top: 6px;
  font-size: 15px;
  color: #666;
}

#container {
  position: relative;
  width: 90%;
  max-width: 800px;
  margin: 20px auto;
}

#baseImage {
  width: 100%;
  display: block;
}

.tapArea {
  position: absolute;
  border: 1px solid #7EC8E3;
  border-radius: 6px;
  background: rgba(0,0,0,0);
}

.previewText {
  position: absolute;
  color: #333;
  font-family: "M PLUS Rounded 1c", sans-serif;
  text-align: left;
  pointer-events: none;
  white-space: normal;
  overflow-wrap: break-word;
}

#saveBtn {
  position: fixed;
  right: 20px;
  bottom: 80px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 0 8px rgba(0,0,0,0.2);
  font-size: 28px;
  border: none;
}

#saveLabel {
  position: fixed;
  right: 10px;
  bottom: 20px;
  font-size: 14px;
  color: #333;
}

#modalBg {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.4);
  display:none;
}

#modal {
  position:absolute;
  top:50%; left:50%;
  transform: translate(-50%, -50%);
  background:white;
  padding:20px;
  border-radius:12px;
  width:80%;
  max-width:300px;
}

#modal input {
  width:100%;
  padding:8px;
  font-size:16px;
  margin-bottom:10px;
}

#modal button {
  padding:8px 16px;
  font-size:16px;
}
</style>
</head>

<body>

<h1>心の備蓄の入口メーカー</h1>
<div class="sub">使うほどに、世界がきらめく。</div>

<div id="container">
  <img id="baseImage" src="10shiten.png">
</div>

<button id="saveBtn">⬇</button>
<div id="saveLabel">保存・印刷はこちら</div>

<div id="modalBg">
  <div id="modal">
    <input id="editText" type="text">
    <button id="saveText">保存</button>
  </div>
</div>

<script>
// 実寸 1414×2000 の吹き出し座標（相棒が最適化）
const areas = [
  {id:"1L", x:160, y:140, w:420, h:120},
  {id:"1R", x:830, y:140, w:420, h:120},

  {id:"2L", x:160, y:350, w:420, h:120},
  {id:"2R", x:830, y:350, w:420, h:120},

  {id:"3L", x:160, y:560, w:420, h:120},
  {id:"3R", x:830, y:560, w:420, h:120},

  {id:"4L", x:160, y:770, w:420, h:120},
  {id:"4R", x:830, y:770, w:420, h:120},

  {id:"5L", x:160, y:980, w:420, h:120},
  {id:"5R", x:830, y:980, w:420, h:120},

  {id:"6L", x:160, y:1190, w:420, h:120},
  {id:"6R", x:830, y:1190, w:420, h:120},

  {id:"7L", x:160, y:1400, w:420, h:120},
  {id:"7R", x:830, y:1400, w:420, h:120},

  {id:"8L", x:160, y:1610, w:420, h:120},
  {id:"8R", x:830, y:1610, w:420, h:120},

  {id:"9L", x:160, y:1820, w:420, h:120},
  {id:"9R", x:830, y:1820, w:420, h:120},
];

let texts = {};
let previewDivs = {};
let currentId = null;

const container = document.getElementById("container");
const baseImage = document.getElementById("baseImage");

// タップ領域配置
baseImage.onload = () => {
  const scale = baseImage.clientWidth / 1414;

  areas.forEach(a => {
    const div = document.createElement("div");
    div.className = "tapArea";

    div.style.left = (a.x * scale) + "px";
    div.style.top = (a.y * scale) + "px";
    div.style.width = (a.w * scale) + "px";
    div.style.height = (a.h * scale) + "px";

    div.dataset.id = a.id;

    div.onclick = () => {
      currentId = a.id;
      document.getElementById("editText").value = texts[a.id] || "";
      document.getElementById("modalBg").style.display = "block";
    };

    container.appendChild(div);

    // プレビュー
    const p = document.createElement("div");
    p.className = "previewText";
    p.style.left = (a.x * scale + 10) + "px";
    p.style.top = (a.y * scale + 12) + "px";
    p.style.width = (a.w * scale - 20) + "px";
    p.style.height = (a.h * scale - 24) + "px";

    container.appendChild(p);
    previewDivs[a.id] = p;
  });
};

// モーダル保存 → プレビュー反映
document.getElementById("saveText").onclick = () => {
  const val = document.getElementById("editText").value;
  texts[currentId] = val;

  const p = previewDivs[currentId];
  p.innerText = val;

  // 自動縮小
  let fontSize = 28;
  p.style.fontSize = fontSize + "px";

  while (p.scrollHeight > p.clientHeight && fontSize > 12) {
    fontSize -= 1;
    p.style.fontSize = fontSize + "px";
  }

  document.getElementById("modalBg").style.display = "none";
};

// PNG 保存
document.getElementById("saveBtn").onclick = () => {
  const img = new Image();
  img.src = "10shiten.png";

  img.onload = () => {
    const canvas = document.createElement("canvas");
    canvas.width = 1414;
    canvas.height = 2000;
    const ctx = canvas.getContext("2d");

    ctx.drawImage(img, 0, 0);

    areas.forEach(a => {
      const text = texts[a.id];
      if (!text) return;

      const boxW = a.w - 20;
      const boxH = a.h - 24;

      let fontSize = 28;
      ctx.font = fontSize + "px 'M PLUS Rounded 1c'";
      ctx.fillStyle = "#333";

      const lines = [];
      let words = text.split("");

      let line = "";
      words.forEach(ch => {
        const test = line + ch;
        if (ctx.measureText(test).width > boxW) {
          lines.push(line);
          line = ch;
        } else {
          line = test;
        }
      });
      lines.push(line);

      while (lines.length * (fontSize + 4) > boxH && fontSize > 12) {
        fontSize -= 1;
        ctx.font = fontSize + "px 'M PLUS Rounded 1c'";
      }

      const totalH = lines.length * (fontSize + 4);
      let y = a.y + (a.h - totalH) / 2 + fontSize;

      lines.forEach(line => {
        ctx.fillText(line, a.x + 14, y);
        y += fontSize + 4;
      });
    });

    const link = document.createElement("a");
    link.download = "entry.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  };
};
</script>

</body>
</html>
