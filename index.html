<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エントリーメーカー</title>

<style>
body {
  margin: 0;
  background: #f5f5f5;
  font-family: "M PLUS Rounded 1c", sans-serif;
  display: flex;
  justify-content: center;
  padding: 20px;
  gap: 20px;
}

/* 左側：画像エリア */
#leftArea {
  position: relative;
  width: 60%;
  max-width: 700px;
}

#baseImage {
  width: 100%;
  display: block;
}

.tapArea {
  position: absolute;
  cursor: pointer;
}

.previewText {
  position: absolute;
  white-space: pre-wrap;
  color: #333;
  pointer-events: none;
  font-size: 22px;
  line-height: 1.35;
}

/* 右側：青い入力欄 */
#rightArea {
  width: 35%;
  min-width: 260px;
}

#inputBox {
  background: #e3f2fd;
  border-radius: 10px;
  padding: 15px;
  min-height: 200px;
}

textarea {
  width: 100%;
  height: 180px;
  font-size: 18px;
  padding: 10px;
  box-sizing: border-box;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* 保存ボタン */
#downloadBtn {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  font-size: 20px;
  border: none;
  border-radius: 8px;
  background: #4caf50;
  color: #fff;
}
</style>
</head>

<body>

<div id="leftArea">
  <img id="baseImage" src="10shiten.png">
</div>

<div id="rightArea">
  <div id="inputBox">
    <textarea id="editText" placeholder="ここに入力"></textarea>
  </div>
  <button id="downloadBtn">保存</button>
</div>

<script>
const IMG_W = 1414;
const IMG_H = 2000;

const areas = [
  {id:"1", x:163, y:334, w:128, h:56},
  {id:"2", x:343, y:334, w:132, h:62},
  {id:"3", x:895, y:336, w:137, h:51},
  {id:"4", x:1079, y:335, w:135, h:64},

  {id:"5", x:159, y:705, w:130, h:56},
  {id:"6", x:343, y:706, w:136, h:59},
  {id:"7", x:535, y:703, w:124, h:60},
  {id:"8", x:709, y:706, w:137, h:60},
  {id:"9", x:900, y:706, w:131, h:51},
  {id:"10", x:1079, y:705, w:135, h:63},

  {id:"11", x:162, y:1061, w:129, h:58},
  {id:"12", x:343, y:1060, w:136, h:64},
  {id:"13", x:903, y:1058, w:124, h:59},
  {id:"14", x:1079, y:1061, w:132, h:66},

  {id:"15", x:157, y:1417, w:133, h:56},
  {id:"16", x:339, y:1415, w:133, h:63},
  {id:"17", x:535, y:1412, w:125, h:57},
  {id:"18", x:710, y:1414, w:134, h:67},
  {id:"19", x:902, y:1413, w:124, h:56},
  {id:"20", x:1078, y:1415, w:134, h:62},
];

let texts = {};
let previewDivs = {};
let currentId = null;

const baseImage = document.getElementById("baseImage");
const leftArea = document.getElementById("leftArea");

function init() {
  const displayW = baseImage.clientWidth;
  const scale = displayW / IMG_W;

  areas.forEach(a => {
    const left = a.x * scale;
    const top  = a.y * scale;
    const w    = a.w * scale;
    const h    = a.h * scale;

    const div = document.createElement("div");
    div.className = "tapArea";
    div.style.left = left + "px";
    div.style.top = top + "px";
    div.style.width = w + "px";
    div.style.height = h + "px";
    div.dataset.id = a.id;

    div.onclick = () => {
      currentId = a.id;
      document.getElementById("editText").value = texts[a.id] || "";
    };

    leftArea.appendChild(div);

    const p = document.createElement("div");
    p.className = "previewText";
    p.style.left = (left + 12 * scale) + "px";
    p.style.top = (top + 12 * scale) + "px";
    p.style.width = (w - 24 * scale) + "px";
    p.style.height = (h - 24 * scale) + "px";
    p.style.fontSize = (22 * scale) + "px";
    p.style.lineHeight = (22 * scale * 1.35) + "px";

    leftArea.appendChild(p);
    previewDivs[a.id] = p;
  });
}

baseImage.addEventListener("load", init);
if (baseImage.complete) init();

document.getElementById("editText").addEventListener("input", () => {
  if (!currentId) return;
  const t = document.getElementById("editText").value;
  texts[currentId] = t;
  previewDivs[currentId].innerText = t;
});

document.getElementById("downloadBtn").onclick = () => {
  const canvas = document.createElement("canvas");
  canvas.width = IMG_W;
  canvas.height = IMG_H;
  const ctx = canvas.getContext("2d");

  const img = new Image();
  img.src = "10shiten.png";

  img.onload = () => {
    ctx.drawImage(img, 0, 0, IMG_W, IMG_H);

    areas.forEach(a => {
      const text = texts[a.id] || "";
      const x = a.x + 12;
      const y = a.y + 20;

      ctx.font = "22px 'M PLUS Rounded 1c'";
      ctx.fillStyle = "#333";
      ctx.textBaseline = "top";

      const lines = text.split("\n");
      lines.forEach((line, i) => {
        ctx.fillText(line, x, y + i * 30);
      });
    });

    const link = document.createElement("a");
    link.download = "entry.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  };
};
</script>

</body>
</html>
