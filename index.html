<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>心の備蓄の入口メーカー</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: "M PLUS Rounded 1c", sans-serif;
  text-align: center;
  background: #fff;
  margin: 0;
  padding: 0;
}

h1 {
  margin-top: 30px;
  font-size: 24px;
  color: #333;
}

.sub {
  margin-top: 6px;
  font-size: 15px;
  color: #666;
}

#container {
  position: relative;
  width: 90%;
  max-width: 800px;
  margin: 20px auto;
}

#baseImage {
  width: 100%;
  display: block;
}

.tapArea {
  position: absolute;
  border: 1px solid #7EC8E3;
  border-radius: 6px;
  background: rgba(0,0,0,0);
}

.previewText {
  position: absolute;
  color: #333;
  font-family: "M PLUS Rounded 1c", sans-serif;
  pointer-events: none;
  white-space: normal;
  overflow-wrap: break-word;
  line-height: 1.35;
}

#saveBtn {
  position: fixed;
  right: 20px;
  bottom: 70px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 0 8px rgba(0,0,0,0.2);
  font-size: 28px;
  border: none;
}

#saveLabel {
  position: fixed;
  right: 6px;
  bottom: 20px;
  font-size: 12px;
  color: #333;
  line-height: 1.3;
}

#modalBg {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.4);
  display:none;
}

#modal {
  position:absolute;
  top:50%; left:50%;
  transform: translate(-50%, -50%);
  background:white;
  padding:20px;
  border-radius:12px;
  width:80%;
  max-width:300px;
}

#modal input {
  width:100%;
  padding:8px;
  font-size:16px;
  margin-bottom:10px;
}

#modal button {
  padding:8px 16px;
  font-size:16px;
}
</style>
</head>

<body>

<h1>心の備蓄の入口メーカー</h1>
<div class="sub">使うほどに、世界がきらめく。</div>

<div id="container">
  <img id="baseImage" src="10shiten.png">
</div>

<button id="saveBtn">⬇</button>
<div id="saveLabel">保存・印刷<br>はこちら</div>

<div id="modalBg">
  <div id="modal">
    <input id="editText" type="text">
    <button id="saveText">保存</button>
  </div>
</div>

<script>
// 10コマ画像：2・3・2・3 の4段構成（割合ベース）
const areas = [
  // 1段目（2つ）
  {id:"1", x:0.13, y:0.085, w:0.30, h:0.075},
  {id:"2", x:0.57, y:0.085, w:0.30, h:0.075},

  // 2段目（3つ）
  {id:"3", x:0.07, y:0.245, w:0.26, h:0.075},
  {id:"4", x:0.37, y:0.245, w:0.26, h:0.075},
  {id:"5", x:0.67, y:0.245, w:0.26, h:0.075},

  // 3段目（2つ）
  {id:"6", x:0.13, y:0.405, w:0.30, h:0.075},
  {id:"7", x:0.57, y:0.405, w:0.30, h:0.075},

  // 4段目（3つ）
  {id:"8", x:0.07, y:0.565, w:0.26, h:0.075},
  {id:"9", x:0.37, y:0.565, w:0.26, h:0.075},
  {id:"10", x:0.67, y:0.565, w:0.26, h:0.075},
];

let texts = {};
let previewDivs = {};
let currentId = null;

const container = document.getElementById("container");
const baseImage = document.getElementById("baseImage");

// タップ領域＆プレビュー配置
baseImage.onload = () => {
  const W = baseImage.clientWidth;
  const H = baseImage.clientHeight;

  areas.forEach(a => {
    const left = a.x * W;
    const top  = a.y * H;
    const w    = a.w * W;
    const h    = a.h * H;

    // タップ領域
    const div = document.createElement("div");
    div.className = "tapArea";
    div.style.left = left + "px";
    div.style.top = top + "px";
    div.style.width = w + "px";
    div.style.height = h + "px";
    div.dataset.id = a.id;

    div.onclick = () => {
      currentId = a.id;
      document.getElementById("editText").value = texts[a.id] || "";
      document.getElementById("modalBg").style.display = "block";
    };

    container.appendChild(div);

    // プレビュー
    const p = document.createElement("div");
    p.className = "previewText";
    p.style.left = (left + 12) + "px";
    p.style.top = (top + 12) + "px";
    p.style.width = (w - 24) + "px";
    p.style.height = (h - 24) + "px";
    container.appendChild(p);

    previewDivs[a.id] = p;
  });
};

// モーダル保存 → プレビュー反映
document.getElementById("saveText").onclick = () => {
  const val = document.getElementById("editText").value;
  texts[currentId] = val;

  const p = previewDivs[currentId];
  p.innerText = val;

  // 自動縮小
  let fontSize = 22;
  p.style.fontSize = fontSize + "px";

  while (p.scrollHeight > p.clientHeight && fontSize > 10) {
    fontSize -= 1;
    p.style.fontSize = fontSize + "px";
  }

  document.getElementById("modalBg").style.display = "none";
};

// PNG 保存
document.getElementById("saveBtn").onclick = () => {
  const img = new Image();
  img.src = "10shiten.png";

  img.onload = () => {
    const canvas = document.createElement("canvas");
    canvas.width = img.width;
    canvas.height = img.height;
    const ctx = canvas.getContext("2d");

    ctx.drawImage(img, 0, 0);

    areas.forEach(a => {
      const text = texts[a.id];
      if (!text) return;

      const x = a.x * img.width;
      const y = a.y * img.height;
      const w = a.w * img.width;
      const h = a.h * img.height;

      const boxX = x + 12;
      const boxY = y + 12;
      const boxW = w - 24;
      const boxH = h - 24;

      let fontSize = 22;
      ctx.font = fontSize + "px 'M PLUS Rounded 1c'";
      ctx.fillStyle = "#333";

      const chars = text.split("");
      let lines = [];
      let line = "";

      const measure = t => ctx.measureText(t).width;

      chars.forEach(ch => {
        const test = line + ch;
        if (measure(test) > boxW) {
          lines.push(line);
          line = ch;
        } else {
          line = test;
        }
      });
      if (line) lines.push(line);

      while (lines.length * (fontSize + 4) > boxH && fontSize > 10) {
        fontSize -= 1;
        ctx.font = fontSize + "px 'M PLUS Rounded 1c'";
        lines = [];
        line = "";
        chars.forEach(ch => {
          const test = line + ch;
          if (measure(test) > boxW) {
            lines.push(line);
            line = ch;
          } else {
            line = test;
          }
        });
        if (line) lines.push(line);
      }

      const totalH = lines.length * (fontSize + 4);
      let drawY = boxY + (boxH - totalH) / 2 + fontSize;

      lines.forEach(l => {
        ctx.fillText(l, boxX, drawY);
        drawY += fontSize + 4;
      });
    });

    const link = document.createElement("a");
    link.download = "entry.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  };
};
</script>

</body>
</html>
