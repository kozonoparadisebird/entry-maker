<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エントリーメーカー</title>

<style>
body {
  margin: 0;
  background: #f5f5f5;
  font-family: "M PLUS Rounded 1c", sans-serif;
}

#container {
  position: relative;
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
}

#baseImage {
  width: 100%;
  display: block;
}

.tapArea {
  position: absolute;
  cursor: pointer;
}

.previewText {
  position: absolute;
  white-space: pre-wrap;
  font-size: 22px;
  line-height: 1.35;
  color: #333;
  pointer-events: none;
}

#modalBg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
}

#modal {
  background: #fff;
  width: 90%;
  max-width: 400px;
  margin: 80px auto;
  padding: 20px;
  border-radius: 10px;
}

textarea {
  width: 100%;
  height: 120px;
  font-size: 18px;
  padding: 10px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  background: #4caf50;
  color: #fff;
}
</style>
</head>

<body>

<div id="container">
  <img id="baseImage" src="10shiten.png">
</div>

<div id="modalBg">
  <div id="modal">
    <div id="maxInfo" style="margin-bottom:6px; font-size:14px; color:#666;"></div>
    <textarea id="editText"></textarea>
    <button id="saveBtn">保存</button>
    <button id="closeBtn" style="background:#999;">閉じる</button>
  </div>
</div>
<script>
const IMG_W = 1414;
const IMG_H = 2000;

const areas = [
  {id:"1", x:163, y:334, w:128, h:56},
  {id:"2", x:343, y:334, w:132, h:62},
  {id:"3", x:895, y:336, w:137, h:51},
  {id:"4", x:1079, y:335, w:135, h:64},

  {id:"5", x:159, y:705, w:130, h:56},
  {id:"6", x:343, y:706, w:136, h:59},
  {id:"7", x:535, y:703, w:124, h:60},
  {id:"8", x:709, y:706, w:137, h:60},
  {id:"9", x:900, y:706, w:131, h:51},
  {id:"10", x:1079, y:705, w:135, h:63},

  {id:"11", x:162, y:1061, w:129, h:58},
  {id:"12", x:343, y:1060, w:136, h:64},
  {id:"13", x:903, y:1058, w:124, h:59},
  {id:"14", x:1079, y:1061, w:132, h:66},

  {id:"15", x:157, y:1417, w:133, h:56},
  {id:"16", x:339, y:1415, w:133, h:63},
  {id:"17", x:535, y:1412, w:125, h:57},
  {id:"18", x:710, y:1414, w:134, h:67},
  {id:"19", x:902, y:1413, w:124, h:56},
  {id:"20", x:1078, y:1415, w:134, h:62},
];

let texts = {};
let previewDivs = {};
let maxCharsMap = {};
let currentId = null;

const baseImage = document.getElementById("baseImage");
const container = document.getElementById("container");

let initialized = false; // 二重実行防止

function init() {
  if (initialized) return;
  initialized = true;

  const displayW = baseImage.clientWidth;
  const displayH = baseImage.clientHeight;

  const scaleX = (displayW / IMG_W) * 1.06;
  const scaleY = (displayH / IMG_H) * 1.06;

  areas.forEach(a => {
    const left = a.x * scaleX;
    const top  = a.y * scaleY;
    const w    = a.w * scaleX;
    const h    = a.h * scaleY;

    const fontSize = 22;
    const lineHeight = fontSize * 1.35;

    const usableW = w - 24;
    const usableH = h - 24;

    const maxLines = Math.floor(usableH / lineHeight);
    const maxCharsPerLine = Math.floor(usableW / (fontSize * 0.9));

    maxCharsMap[a.id] = Math.max(1, maxLines * maxCharsPerLine);

    const div = document.createElement("div");
    div.className = "tapArea";
    div.style.left = left + "px";
    div.style.top = top + "px";
    div.style.width = w + "px";
    div.style.height = h + "px";
    div.dataset.id = a.id;

    div.onclick = () => {
      currentId = a.id;
      document.getElementById("editText").value = texts[a.id] || "";
      document.getElementById("maxInfo").innerText = `（最大 ${maxCharsMap[a.id]} 文字）`;
      document.getElementById("modalBg").style.display = "block";
    };

    container.appendChild(div);

    const p = document.createElement("div");
    p.className = "previewText";
    p.style.left = (left + 12) + "px";
    p.style.top = (top + 12) + "px";
    p.style.width = (w - 24) + "px";
    p.style.height = (h - 24) + "px";

    container.appendChild(p);
    previewDivs[a.id] = p;
  });
}

baseImage.addEventListener("load", init);
if (baseImage.complete) init();

document.getElementById("saveBtn").onclick = () => {
  if (!currentId) return;

  const max = maxCharsMap[currentId];
  let t = document.getElementById("editText").value;

  if (t.length > max) {
    t = t.slice(0, max);
  }

  texts[currentId] = t;
  previewDivs[currentId].innerText = t;

  document.getElementById("modalBg").style.display = "none";
};

document.getElementById("closeBtn").onclick = () => {
  document.getElementById("modalBg").style.display = "none";
};
</script>

</body>
</html>
