<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>心の備蓄の入口メーカー</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: "M PLUS Rounded 1c", sans-serif;
  text-align: center;
  background: #fff;
  margin: 0;
  padding: 0;
}

#container {
  position: relative;
  width: 90%;
  max-width: 800px;
  margin: 20px auto;
}

#baseImage {
  width: 100%;
  height: auto;
  display: block;
}

.tapArea {
  position: absolute;
  border: 1px solid #7EC8E3;
  border-radius: 6px;
}

.previewText {
  position: absolute;
  color: #333;
  pointer-events: none;
  white-space: normal;
  overflow-wrap: break-word;
  line-height: 1.35;
}

/* 保存ボタン */
#saveBtn {
  position: fixed;
  right: 20px;
  bottom: 70px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 0 8px rgba(0,0,0,0.2);
  font-size: 28px;
  border: none;
}

#saveLabel {
  position: fixed;
  right: 6px;
  bottom: 20px;
  font-size: 12px;
  color: #333;
  line-height: 1.3;
}
</style>
</head>

<body>

<div id="container">
  <img id="baseImage" src="10shiten.png">
</div>

<button id="saveBtn">⬇</button>
<div id="saveLabel">保存・印刷<br>はこちら</div>

<!-- モーダル -->
<div id="modalBg" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4);">
  <div id="modal" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; border-radius:12px; width:80%; max-width:300px;">
    <input id="editText" type="text" style="width:100%; padding:8px; font-size:16px;">
    <div id="maxInfo" style="margin-top:6px; font-size:13px; color:#666;"></div>
    <button id="saveText" style="padding:8px 16px; font-size:16px; margin-top:10px;">保存</button>
  </div>
</div>

<script>
// 元画像サイズ
const IMG_W = 1414;
const IMG_H = 2000;

// 20吹き出しの絶対座標
const areas = [
  {id:"1", x:163, y:334, w:128, h:56},
  {id:"2", x:343, y:334, w:132, h:62},
  {id:"3", x:895, y:336, w:137, h:51},
  {id:"4", x:1079, y:335, w:135, h:64},

  {id:"5", x:159, y:705, w:130, h:56},
  {id:"6", x:343, y:706, w:136, h:59},
  {id:"7", x:535, y:703, w:124, h:60},
  {id:"8", x:709, y:706, w:137, h:60},
  {id:"9", x:900, y:706, w:131, h:51},
  {id:"10", x:1079, y:705, w:135, h:63},

  {id:"11", x:162, y:1061, w:129, h:58},
  {id:"12", x:343, y:1060, w:136, h:64},
  {id:"13", x:903, y:1058, w:124, h:59},
  {id:"14", x:1079, y:1061, w:132, h:66},

  {id:"15", x:157, y:1417, w:133, h:56},
  {id:"16", x:339, y:1415, w:133, h:63},
  {id:"17", x:535, y:1412, w:125, h:57},
  {id:"18", x:710, y:1414, w:134, h:67},
  {id:"19", x:902, y:1413, w:124, h:56},
  {id:"20", x:1078, y:1415, w:134, h:62},
];

let texts = {};
let previewDivs = {};
let maxCharsMap = {};
let currentId = null;

const container = document.getElementById("container");
const baseImage = document.getElementById("baseImage");

baseImage.onload = () => {
  const rect = baseImage.getBoundingClientRect();
  const displayW = rect.width;
  const displayH = rect.height;

  // ズレ補正（あなたの感覚に合わせた最適値）
  const scaleX = (displayW / IMG_W) * 1.006;
  const scaleY = (displayH / IMG_H) * 1.006;

  areas.forEach(a => {
    const left = a.x * scaleX;
    const top  = a.y * scaleY;
    const w    = a.w * scaleX;
    const h    = a.h * scaleY;

    // 最大文字数を自動計算
    const usableH = h - (12 * scaleY * 2);
    const usableW = w - (12 * scaleX * 2);
    const fontSize = 22 * scaleX;
    const lineHeight = fontSize + 4;

    const maxLines = Math.floor(usableH / lineHeight);
    const maxCharsPerLine = Math.floor(usableW / (fontSize * 0.9));
    const maxChars = Math.max(1, maxLines * maxCharsPerLine);

    maxCharsMap[a.id] = maxChars;

    // タップ枠
    const div = document.createElement("div");
    div.className = "tapArea";
    div.style.left = left + "px";
    div.style.top = top + "px";
    div.style.width = w + "px";
    div.style.height = h + "px";
    div.dataset.id = a.id;

    div.onclick = () => {
      currentId = a.id;
      document.getElementById("editText").value = texts[a.id] || "";
      document.getElementById("maxInfo").innerText = `（最大 ${maxCharsMap[a.id]} 文字）`;
      document.getElementById("modalBg").style.display = "block";
    };

    container.appendChild(div);

    // プレビュー
    const p = document.createElement("div");
    p.className = "previewText";
    p.style.left = (left + 12 * scaleX) + "px";
    p.style.top = (top + 12 * scaleY) + "px";
    p.style.width = (w - 24 * scaleX) + "px";
    p.style.height = (h - 24 * scaleY) + "px";
    container.appendChild(p);

    previewDivs[a.id] = p;
  });
};

// 入力ブロック
document.getElementById("editText").addEventListener("input", function() {
  const max = maxCharsMap[currentId];
  if (this.value.length > max) {
    this.value = this.value.slice(0, max);
  }
});

// 保存 → プレビュー反映
document.getElementById("saveText").onclick = () => {
  const val = document.getElementById("editText").value;
  texts[currentId] = val;

  const p = previewDivs[currentId];
  p.innerText = val;

  let fontSize = 22;
  p.style.fontSize = fontSize + "px";

  while (p.scrollHeight > p.clientHeight && fontSize > 10) {
    fontSize -= 1;
    p.style.fontSize = fontSize + "px";
  }

  document.getElementById("modalBg").style.display = "none";
};
</script>

</body>
</html>
